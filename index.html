<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Futures Volatility Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #0b0b0b;
    color: white;
    padding: 10px;
}
h2 { text-align: center; }

button {
    padding: 12px;
    margin: 10px 0;
    width: 100%;
    background: #2962ff;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
}

.panel {
    background:#111;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    text-align: center;
    font-size: 12px;
}

th { background: #222; cursor:pointer; }

tr:nth-child(even) { background: #1a1a1a; }

.positive { color: #00ff9c; }
.negative { color: #ff4d4d; }

.high { color:#00ff9c; font-weight:bold; }
.medium { color:#f1c40f; }
.low { color:#888; }
</style>
</head>

<body>

<h2>🚀 Futures Volatility Scanner</h2>

<div id="lastUpdated">Last Updated: --</div>
<button onclick="fetchData()">🔄 Refresh</button>

<!-- Gainers -->
<div class="panel">
<b>📈 Top Gainers</b>
<table>
<thead>
<tr>
<th>Symbol</th>
<th>24h</th>
<th>Prev</th>
<th>Remark</th>
</tr>
</thead>
<tbody id="gainersBody"></tbody>
</table>
</div>

<!-- Losers -->
<div class="panel">
<b>📉 Top Losers</b>
<table>
<thead>
<tr>
<th>Symbol</th>
<th>24h</th>
<th>Prev</th>
<th>Remark</th>
</tr>
</thead>
<tbody id="losersBody"></tbody>
</table>
</div>

<!-- MAIN TABLE -->
<table id="cryptoTable">
<thead>
<tr>
<th onclick="setSort('symbol')">Symbol</th>
<th onclick="setSort('change15m')">15m</th>
<th>Trend15</th>
<th onclick="setSort('change1h')">1h</th>
<th onclick="setSort('change4h')">4h</th>
<th onclick="setSort('change24')">24h</th>
<th onclick="setSort('atr')">ATR%</th>
<th>OI</th>
<th>Ext</th>
<th>Pullback</th>
<th>Trend</th>
<th onclick="setSort('score')">Score</th>
<th>Signal</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

let tableData=[];
let oiCache={};
let sortKey="change15m";
let sortAsc=false;

async function fetchData(){

document.getElementById("lastUpdated").innerText="Loading...";

const ticker=await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr')
.then(res=>res.json());

let pairs=ticker
.filter(c=>c.symbol.endsWith("USDT"))
.sort((a,b)=>parseFloat(b.quoteVolume)-parseFloat(a.quoteVolume))
.slice(0,25);

tableData=[];

await Promise.all(pairs.map(async coin=>{

let symbol=coin.symbol;
let volume=parseFloat(coin.quoteVolume);

// 1D
let k1d=await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=1d&limit=3`).then(r=>r.json());
let c0=parseFloat(k1d[0][4]);
let c1=parseFloat(k1d[1][4]);
let c2=parseFloat(k1d[2][4]);

let change24=((c2-c1)/c1)*100;
let prev24=((c1-c0)/c0)*100;

// 15m
let k15=await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=15m&limit=5`).then(r=>r.json());
let c15_1=parseFloat(k15[4][4]);
let c15_2=parseFloat(k15[3][4]);
let c15_3=parseFloat(k15[2][4]);

let change15m=((c15_1-c15_2)/c15_2)*100;

let trend15="⚪";
if(c15_1>c15_2 && c15_2>c15_3) trend15="🟢";
else if(c15_1<c15_2 && c15_2<c15_3) trend15="🔴";

// 1H
let k1=await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=1h&limit=20`).then(r=>r.json());
let closes=k1.map(k=>parseFloat(k[4]));
let highs=k1.map(k=>parseFloat(k[2]));
let lows=k1.map(k=>parseFloat(k[3]));

let change1h=((closes[19]-closes[18])/closes[18])*100;

// ATR
let trSum=0;
for(let i=6;i<20;i++){
let tr=Math.max(highs[i]-lows[i],Math.abs(highs[i]-closes[i-1]),Math.abs(lows[i]-closes[i-1]));
trSum+=tr;
}
let atr=(trSum/14)/closes[19]*100;

if(Math.abs(change1h)<0.05 && atr<0.2) return;

// 4H
let k4=await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=4h&limit=3`).then(r=>r.json());
let change4h=((k4[2][4]-k4[1][4])/k4[1][4])*100;

// OI
let oiData=await fetch(`https://fapi.binance.com/fapi/v1/openInterest?symbol=${symbol}`).then(r=>r.json());
let currentOI=parseFloat(oiData.openInterest);
let prevOI=oiCache[symbol];
oiCache[symbol]=currentOI;

let oiTrend="Neutral";
if(prevOI){
let oiChange=((currentOI-prevOI)/prevOI)*100;
if(change1h>0 && oiChange>0.05) oiTrend="🟢";
else if(change1h<0 && oiChange>0.05) oiTrend="🔴";
}

// EXTENSION
let ema=closes.slice(-9).reduce((a,b)=>a+b,0)/9;
let dist=((closes[19]-ema)/ema)*100;
let extension = dist>1.5 ? "⚠️" : "OK";

// PULLBACK
let pullback="None";
if(trend15==="🟢" && c15_1<c15_2) pullback="📉";
if(trend15==="🔴" && c15_1>c15_2) pullback="📈";

// TREND
let trend="Weak";
if(change1h>0.5 && change4h>1) trend="Strong Up";
else if(change1h<-0.5 && change4h<-1) trend="Strong Down";
else if(Math.abs(change1h)>0.3) trend="Medium";

// SCORE
let score=50+change1h*5+change4h*3+change24*0.5;
score=Math.max(0,Math.min(100,Math.round(score)));

// SIGNAL
let signal="❌";
if(score>70 && extension==="OK" && pullback!=="None" && trend!=="Weak"){
signal="🔥";
}
else if(score>60 && extension==="OK"){
signal="GOOD";
}

// REMARK
let remark="❌ Skip";
if(signal==="🔥") remark="🔥 Ideal";
else if(pullback!=="None") remark="📉 Pullback";
else if(extension!=="OK") remark="⚠️ Extended";

// PUSH
tableData.push({
symbol,change15m,trend15,change1h,change4h,
change24,prev24,atr,oiTrend,
extension,pullback,trend,score,signal,remark
});

}));

renderBest();
renderTable();

document.getElementById("lastUpdated").innerText="Last Updated: "+new Date().toLocaleTimeString();
}

// SORT
function setSort(key){
if(sortKey===key) sortAsc=!sortAsc;
else{sortKey=key;sortAsc=false;}
renderTable();
}

// GAINERS/LOSERS
function renderBest(){
let gainers=[...tableData].sort((a,b)=>b.change24-a.change24).slice(0,5);
let losers=[...tableData].sort((a,b)=>a.change24-b.change24).slice(0,5);

let g=document.getElementById("gainersBody");
let l=document.getElementById("losersBody");

g.innerHTML=""; l.innerHTML="";

gainers.forEach(r=>{
g.innerHTML+=`<tr>
<td>${r.symbol}</td>
<td class="positive">${r.change24.toFixed(2)}%</td>
<td>${r.prev24.toFixed(2)}%</td>
<td>${r.remark}</td>
</tr>`;
});

losers.forEach(r=>{
l.innerHTML+=`<tr>
<td>${r.symbol}</td>
<td class="negative">${r.change24.toFixed(2)}%</td>
<td>${r.prev24.toFixed(2)}%</td>
<td>${r.remark}</td>
</tr>`;
});
}

// TABLE
function renderTable(){
let tbody=document.querySelector("#cryptoTable tbody");
tbody.innerHTML="";

let data=[...tableData].sort((a,b)=>{
let A=a[sortKey],B=b[sortKey];
return sortAsc?A-B:B-A;
});

data.forEach(r=>{
tbody.innerHTML+=`
<tr>
<td onclick="window.open('https://www.binance.com/en/futures/${r.symbol}','_blank')" style="color:#4da3ff;cursor:pointer">${r.symbol}</td>
<td class="${r.change15m>=0?'positive':'negative'}">${r.change15m.toFixed(2)}%</td>
<td>${r.trend15}</td>
<td>${r.change1h.toFixed(2)}%</td>
<td>${r.change4h.toFixed(2)}%</td>
<td>${r.change24.toFixed(2)}%</td>
<td>${r.atr.toFixed(2)}</td>
<td>${r.oiTrend}</td>
<td>${r.extension}</td>
<td>${r.pullback}</td>
<td>${r.trend}</td>
<td>${r.score}</td>
<td>${r.signal}</td>
</tr>`;
});
}

setInterval(fetchData,30000);
fetchData();

</script>
</body>
</html>
