<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Futures Volatility Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #0b0b0b;
    color: white;
    padding: 10px;
}

h2 { text-align: center; }

button {
    padding: 12px;
    margin: 10px 0;
    width: 100%;
    background: #2962ff;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
}

.panel {
    background:#111;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}

.tableWrap{
    overflow-x:auto;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    text-align: center;
    font-size: 12px;
}

th { background: #222; cursor:pointer; }

tr:nth-child(even) { background: #1a1a1a; }

.positive { color: #00ff9c; }
.negative { color: #ff4d4d; }

.bull { color: #00ff9c; font-weight: bold; }
.bear { color: #ff4d4d; font-weight: bold; }

.high { color:#00ff9c; font-weight:bold; }
.medium { color:#f1c40f; }
.low { color:#888; }

.detailBox {
    background:#111;
    padding:15px;
    border-radius:8px;
}

.detailTable {
    width:100%;
    border-collapse:collapse;
    margin-bottom:10px;
}

.detailTable th {
    background:#222;
    font-size:11px;
}

.detailTable td {
    font-size:11px;
    padding:6px;
}
</style>
</head>

<body>

<h2>🚀 Futures Volatility Scanner</h2>

<div id="lastUpdated">Last Updated: --</div>

<button onclick="fetchData()">🔄 Refresh</button>

<div class="panel">
<b>📈 Top Gainers (24h)</b>
<div class="tableWrap">
<table>
<thead>
<tr>
<th>Symbol</th>
<th>24h %</th>
</tr>
</thead>
<tbody id="gainersBody"></tbody>
</table>
</div>
</div>

<div class="panel">
<b>📉 Top Losers (24h)</b>
<div class="tableWrap">
<table>
<thead>
<tr>
<th>Symbol</th>
<th>24h %</th>
</tr>
</thead>
<tbody id="losersBody"></tbody>
</table>
</div>
</div>

<div class="tableWrap">
<table id="cryptoTable">
<thead>
<tr>
<th onclick="setSort('symbol')">Symbol</th>

<th onclick="setSort('change15m')">15m</th>
<th onclick="setSort('prev15m')">Prev15m</th>

<th onclick="setSort('change1h')">1h</th>
<th onclick="setSort('prev1h')">Prev1h</th>
<th onclick="setSort('change4h')">4h</th>
<th onclick="setSort('prev4h')">Prev4h</th>

<th onclick="setSort('change24')">24h</th>
<th onclick="setSort('oiTrend')">OI</th>
<th onclick="setSort('liqText')">Liquidation</th>
<th onclick="setSort('volume')">Vol</th>
<th onclick="setSort('atr')">ATR%</th>
<th onclick="setSort('breakout')">Breakout</th>
<th onclick="setSort('score')">Score</th>
<th onclick="setSort('scalp')">Scalp</th>
<th>Details</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

let tableData=[];
let oiCache={};
let sortedData=[];

// 🔥 SORT STATE
let sortKey = "change15m";
let sortAsc = false;

async function fetchData(){

document.getElementById("lastUpdated").innerText="Loading...";

const ticker=await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr')
.then(res=>res.json());

let usdtPairs=ticker
.filter(c=>c.symbol.endsWith("USDT"))
.sort((a,b)=>parseFloat(b.quoteVolume)-parseFloat(a.quoteVolume))
.slice(0,25);

tableData=[];

await Promise.all(usdtPairs.map(async coin=>{

let symbol=coin.symbol;
let volume=parseFloat(coin.quoteVolume);

// ===== TRUE 1D (5:30 AM IST RESET) =====
let k1d = await fetch(
`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=1d&limit=2`
).then(res => res.json());

let todayClose = parseFloat(k1d[1][4]);
let yesterdayClose = parseFloat(k1d[0][4]);

let change24 = ((todayClose - yesterdayClose) / yesterdayClose) * 100;

let dayHigh = parseFloat(coin.highPrice);
let dayLow = parseFloat(coin.lowPrice);
let currentPrice = parseFloat(coin.lastPrice);

try{

// ===== 15 MIN DATA =====
let k15=await fetch(
`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=15m&limit=5`
).then(res=>res.json());

let c15_1 = parseFloat(k15[4][4]);
let c15_2 = parseFloat(k15[3][4]);
let c15_3 = parseFloat(k15[2][4]);

let change15m = ((c15_1 - c15_2) / c15_2) * 100;
let prev15m = ((c15_2 - c15_3) / c15_3) * 100;


// ===== 1H DATA =====
let k1=await fetch(
`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=1h&limit=20`
).then(res=>res.json());

let currentOpen = parseFloat(k1[19][1]);
let closes=k1.map(k=>parseFloat(k[4]));
let highs=k1.map(k=>parseFloat(k[2]));
let lows=k1.map(k=>parseFloat(k[3]));

let c1=closes[19];
let c2=closes[18];
let c3=closes[17];

let change1h=((c1-c2)/c2)*100;
let prev1h=((c2-c3)/c3)*100;

let trSum=0;
for(let i=6;i<20;i++){
let tr=Math.max(
highs[i]-lows[i],
Math.abs(highs[i]-closes[i-1]),
Math.abs(lows[i]-closes[i-1])
);
trSum+=tr;
}
let atr=(trSum/14)/c1*100;

if(Math.abs(change1h)<0.05 && atr<0.2) return;


// ===== 4H DATA =====
let k4=await fetch(
`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=4h&limit=3`
).then(res=>res.json());

let d1=parseFloat(k4[2][4]);
let d2=parseFloat(k4[1][4]);
let d3=parseFloat(k4[0][4]);

let change4h=((d1-d2)/d2)*100;
let prev4h=((d2-d3)/d3)*100;


// ===== OI =====
let oiData=await fetch(
`https://fapi.binance.com/fapi/v1/openInterest?symbol=${symbol}`
).then(res=>res.json());

let currentOI=parseFloat(oiData.openInterest);
let prevOI=oiCache[symbol];
oiCache[symbol]=currentOI;

let oiChange=prevOI?((currentOI-prevOI)/prevOI)*100:0;

let oiTrend="Neutral",oiClass="";
if(change1h>0&&oiChange>0.05){oiTrend="Strong Buying";oiClass="bull";}
else if(change1h<0&&oiChange>0.05){oiTrend="Strong Selling";oiClass="bear";}


// ===== LIQ =====
let liqText="Low";
if(change1h>1&&oiChange<-0.05) liqText="🔥 Shorts Squeezed";
else if(change1h<-1&&oiChange<-0.05) liqText="🔥 Longs Wiped";
else if(Math.abs(change1h)>1&&oiChange>0.05) liqText="⚠️ Possible";


// ===== BREAKOUT =====
let breakout="-";
if(change1h>Math.abs(prev1h)*1.5) breakout="🚀 Up";
if(change1h<-Math.abs(prev1h)*1.5) breakout="💥 Down";


// ===== SCORE =====
let score=50;
score+=change1h*5;
score+=change4h*3;
score+=change24*0.5;
if(oiTrend.includes("Strong"))score+=10;
if(atr>1)score+=10;

score=Math.max(0,Math.min(100,Math.round(score)));

let scalp="LOW",scalpClass="low";
if(score>75){scalp="🔥 HIGH";scalpClass="high";}
else if(score>60){scalp="⚡ MED";scalpClass="medium";}


// ===== PUSH =====
tableData.push({
symbol,
change15m, prev15m,
change1h, prev1h,
change4h, prev4h,
change24,
oiTrend, oiClass,
liqText,
volume,
atr,
breakout,
score,
scalp, scalpClass,
dayHigh, dayLow,
currentPrice,
currentOpen
});

}catch(e){}

}));

renderBest();
renderTable();

let now=new Date();
document.getElementById("lastUpdated").innerText=
"Last Updated: "+now.toLocaleTimeString();
}


// ===== SORT FUNCTION =====
function setSort(key){
    if(sortKey === key){
        sortAsc = !sortAsc;
    } else {
        sortKey = key;
        sortAsc = false;
    }
    renderTable();
}


// ===== BEST =====
function renderBest(){

let best=[...tableData]
.sort((a,b)=>b.score-a.score)
.slice(0,5);

let body=document.getElementById("bestBody");
body.innerHTML="";

best.forEach(r=>{
let dir=r.change1h>0?"LONG":"SHORT";

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${r.symbol}</td>
<td>${dir}</td>
<td>${r.score}</td>
<td class="${r.scalpClass}">${r.scalp}</td>
<td>${r.breakout}</td>
`;

body.appendChild(tr);
});
}


// ===== TABLE =====
function renderTable(){

let tbody=document.querySelector("#cryptoTable tbody");
tbody.innerHTML="";

// 🔥 DYNAMIC SORT
sortedData = [...tableData].sort((a,b)=>{
    let valA = a[sortKey];
    let valB = b[sortKey];

    if(typeof valA === "string"){
        return sortAsc 
            ? valA.localeCompare(valB)
            : valB.localeCompare(valA);
    }

    return sortAsc ? valA - valB : valB - valA;
});

sortedData.forEach((row,index)=>{

let volFormatted=(row.volume/1000000).toFixed(1)+"M";

let tr=document.createElement("tr");

tr.innerHTML=`
<td onclick="openChart('${row.symbol}')" style="color:#4da3ff;cursor:pointer">
${row.symbol}</td>

<td class="${row.change15m>=0?'positive':'negative'}">${row.change15m.toFixed(2)}%</td>
<td class="${row.prev15m>=0?'positive':'negative'}">${row.prev15m.toFixed(2)}%</td>

<td class="${row.change1h>=0?'positive':'negative'}">${row.change1h.toFixed(2)}%</td>
<td class="${row.prev1h>=0?'positive':'negative'}">${row.prev1h.toFixed(2)}%</td>

<td class="${row.change4h>=0?'positive':'negative'}">${row.change4h.toFixed(2)}%</td>
<td class="${row.prev4h>=0?'positive':'negative'}">${row.prev4h.toFixed(2)}%</td>

<td class="${row.change24>=0?'positive':'negative'}">${row.change24.toFixed(2)}%</td>

<td class="${row.oiClass}">${row.oiTrend}</td>
<td>${row.liqText}</td>
<td>${volFormatted}</td>
<td>${row.atr.toFixed(2)}</td>
<td>${row.breakout}</td>
<td>${row.score}</td>
<td class="${row.scalpClass}">${row.scalp}</td>

<td style="cursor:pointer" onclick="toggleDetails(this)">▶</td>
`;

tbody.appendChild(tr);
});
}

function openChart(symbol){
window.open(`https://www.binance.com/en/futures/${symbol}`,'_blank');
}

setInterval(fetchData,30000);
fetchData();

</script>
</body>
</html>
