<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Momentum Scanner PRO</title>
<style>
body{font-family:Arial;background:#0b0b0b;color:white;padding:10px}
h2{text-align:center}
.panel{background:#111;padding:12px;border-radius:12px;margin-bottom:14px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;text-align:center;font-size:12px}
th{background:#222}
th:hover{cursor:pointer;background:#333}
.positive{color:#00ff9c}
.negative{color:#ff4d4d}
.small{color:#888}
a{color:#00e5ff;text-decoration:none}
</style>
</head>
<body>

<h2>🚀 Momentum Scanner PRO</h2>
<div id="lastUpdated"></div>

<div class="panel">
<b>📈 Top Gainers (Since 5:30 IST)</b>
<table>
<thead>
<tr>
<th>Symbol</th><th>India</th><th>London</th><th>NewYork</th><th>Dist High</th><th>Vol</th>
</tr>
</thead>
<tbody id="gainers"></tbody>
</table>
</div>

<div class="panel">
<b>📉 Top Losers (Since 5:30 IST)</b>
<table>
<thead>
<tr>
<th>Symbol</th><th>India</th><th>London</th><th>NewYork</th><th>Dist Low</th><th>Vol</th>
</tr>
</thead>
<tbody id="losers"></tbody>
</table>
</div>

<div class="panel">
<b>⚡ Momentum Structure</b>
<table>
<thead>
<tr>
<th onclick="sortMomentum('symbol')">Symbol ↕</th>
<th onclick="sortMomentum('structure')">15m Structure ↕</th>
<th onclick="sortMomentum('prev1H')">Prev1H ↕</th>
<th onclick="sortMomentum('curr1H')">Curr1H ↕</th>
</tr>
</thead>
<tbody id="momentum"></tbody>
</table>
</div>

<script>
let momentumData=[];
let sortField='curr1H';
let sortAsc=false;

function getStartTime(){
 let now=new Date();
 let istOffset=5.5*60*60*1000;
 let utc=now.getTime()+now.getTimezoneOffset()*60000;
 let ist=new Date(utc+istOffset);
 ist.setHours(5,30,0,0);
 return ist.getTime();
}

function getUTCSessionTime(hour,minute){
 let now=new Date();
 return Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate(),hour,minute,0,0);
}

function formatVolume(v){
 if(v>=1000000000)return (v/1000000000).toFixed(2)+'B';
 return (v/1000000).toFixed(1)+'M';
}

function getBinanceLink(symbol){
 return `<a href="https://www.binance.com/en/futures/${symbol}" target="_blank">${symbol}</a>`;
}

function sortMomentum(field){
 if(sortField===field){sortAsc=!sortAsc;}
 else{sortField=field;sortAsc=false;}
 renderMomentum();
}

function renderMomentum(){
 let rows=[...momentumData];

 rows.sort((a,b)=>{
   let av=a[sortField];
   let bv=b[sortField];

   if(sortField==='structure'){
      let rank={Bullish:3,Neutral:2,Bearish:1};
      return sortAsc ? rank[av]-rank[bv] : rank[bv]-rank[av];
   }

   if(typeof av==='string'){
      return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
   }

   return sortAsc ? av-bv : bv-av;
 });

 let html='';

 rows.forEach(r=>{
   html+=`
   <tr>
   <td>${getBinanceLink(r.symbol)}</td>
   <td class="${r.structure==='Bullish'?'positive':r.structure==='Bearish'?'negative':'small'}">${r.structure}</td>
   <td class="${r.prev1H>=0?'positive':'negative'}">${r.prev1H.toFixed(2)}%</td>
   <td class="${r.curr1H>=0?'positive':'negative'}">${r.curr1H.toFixed(2)}%</td>
   </tr>`;
 });

 document.getElementById('momentum').innerHTML=html;
}

async function fetchData(){

 let ticker=await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr').then(r=>r.json());

 let coins=ticker
 .filter(c=>c.symbol.endsWith('USDT'))
 .sort((a,b)=>parseFloat(b.quoteVolume)-parseFloat(a.quoteVolume))
 .slice(0,25);

 let start=getStartTime();
 let londonStart=getUTCSessionTime(8,0);
 let nyStart=getUTCSessionTime(13,30);

 let sessionData=[];
 let momentumRows=[];

 for(let coin of coins){

   let symbol=coin.symbol;

   let k5=await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=5m&limit=300`).then(r=>r.json());

   let indiaPrice=null,londonPrice=null,nyPrice=null;

   for(let k of k5){
      let t=k[0];
      if(indiaPrice===null && t>=start) indiaPrice=parseFloat(k[1]);
      if(londonPrice===null && t>=londonStart) londonPrice=parseFloat(k[1]);
      if(nyPrice===null && t>=nyStart) nyPrice=parseFloat(k[1]);
   }

   let current=parseFloat(k5[k5.length-1][4]);

   let indiaChange=indiaPrice?((current-indiaPrice)/indiaPrice)*100:null;
   let londonChange=londonPrice?((current-londonPrice)/londonPrice)*100:null;
   let nyChange=nyPrice?((current-nyPrice)/nyPrice)*100:null;

   let distHigh=((parseFloat(coin.highPrice)-current)/parseFloat(coin.highPrice))*100;
   let distLow=((current-parseFloat(coin.lowPrice))/parseFloat(coin.lowPrice))*100;

   if(indiaChange!==null){
      sessionData.push({
         symbol,change:indiaChange,london:londonChange,ny:nyChange,
         volume:parseFloat(coin.quoteVolume),distHigh,distLow
      });
   }

   let k15=await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=15m&limit=3`).then(r=>r.json());

   let s1=parseFloat(k15[0][4]);
   let s2=parseFloat(k15[1][4]);
   let s3=parseFloat(k15[2][4]);

   let structure='Neutral';
   if(s3>s2 && s2>s1) structure='Bullish';
   if(s3<s2 && s2<s1) structure='Bearish';

   let k1h=await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=1h&limit=2`).then(r=>r.json());

   let prev1H=((parseFloat(k1h[0][4])-parseFloat(k1h[0][1]))/parseFloat(k1h[0][1]))*100;
   let curr1H=((parseFloat(k1h[1][4])-parseFloat(k1h[1][1]))/parseFloat(k1h[1][1]))*100;

   momentumRows.push({symbol,structure,prev1H,curr1H});
 }

 let gainers=[...sessionData].sort((a,b)=>b.change-a.change).slice(0,10);
 let losers=[...sessionData].sort((a,b)=>a.change-b.change).slice(0,10);

 let ghtml='';
 gainers.forEach(c=>{
  ghtml+=`<tr><td>${getBinanceLink(c.symbol)}</td><td class="${c.change>=0?'positive':'negative'}">${c.change.toFixed(2)}%</td><td>${c.london==null?'--':c.london.toFixed(2)+'%'}</td><td>${c.ny==null?'--':c.ny.toFixed(2)+'%'}</td><td class="negative">${c.distHigh.toFixed(2)}%</td><td>${formatVolume(c.volume)}</td></tr>`;
 });
 document.getElementById('gainers').innerHTML=ghtml;

 let lhtml='';
 losers.forEach(c=>{
  lhtml+=`<tr><td>${getBinanceLink(c.symbol)}</td><td class="${c.change>=0?'positive':'negative'}">${c.change.toFixed(2)}%</td><td>${c.london==null?'--':c.london.toFixed(2)+'%'}</td><td>${c.ny==null?'--':c.ny.toFixed(2)+'%'}</td><td class="positive">${c.distLow.toFixed(2)}%</td><td>${formatVolume(c.volume)}</td></tr>`;
 });
 document.getElementById('losers').innerHTML=lhtml;

 let selected=new Set();
 gainers.forEach(x=>selected.add(x.symbol));
 losers.forEach(x=>selected.add(x.symbol));

 momentumData=momentumRows.filter(x=>selected.has(x.symbol));
 renderMomentum();

 document.getElementById('lastUpdated').innerText='Updated: '+new Date().toLocaleTimeString();
}

setInterval(fetchData,60000);
fetchData();
</script>
</body>
</html>
