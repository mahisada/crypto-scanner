<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Futures Volatility Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #0b0b0b;
    color: white;
    padding: 10px;
}

h2 { text-align: center; }

button {
    padding: 12px;
    margin: 10px 0;
    width: 100%;
    background: #2962ff;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    text-align: center;
    font-size: 13px;
}

th { background: #222; }

tr:nth-child(even) { background: #1a1a1a; }

.positive { color: #00ff9c; }
.negative { color: #ff4d4d; }

.bull { color: #00ff9c; font-weight: bold; }
.bear { color: #ff4d4d; font-weight: bold; }
.neutral { color: #f1c40f; }

</style>
</head>

<body>

<h2>🚀 Futures Volatility Scanner</h2>

<div id="lastUpdated">Last Updated: --</div>

<button onclick="fetchData()">🔄 Refresh</button>

<table id="cryptoTable">
<thead>
<tr>
<th>Symbol</th>
<th>1h</th>
<th>Prev1h</th>
<th>4h</th>
<th>Prev4h</th>
<th>24h</th>
<th>Vol</th>
<th>OI Trend</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

let tableData = [];
let oiCache = {};

async function fetchData() {

    document.getElementById("lastUpdated").innerText = "Loading...";

    const ticker = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr')
        .then(res => res.json());

    let usdtPairs = ticker
        .filter(c => c.symbol.endsWith("USDT"))
        .sort((a,b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
        .slice(0, 30);

    tableData = [];

    await Promise.all(usdtPairs.map(async coin => {

        let symbol = coin.symbol;
        let change24 = parseFloat(coin.priceChangePercent);
        let volume = parseFloat(coin.quoteVolume);

        try {

            // ---------- 1H ----------
            let k1 = await fetch(
                `https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=1h&limit=3`
            ).then(res => res.json());

            let c1 = parseFloat(k1[2][4]);
            let c2 = parseFloat(k1[1][4]);
            let c3 = parseFloat(k1[0][4]);

            let change1h = ((c1 - c2) / c2) * 100;
            let prev1h = ((c2 - c3) / c3) * 100;

            // ---------- 4H ----------
            let k4 = await fetch(
                `https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=4h&limit=3`
            ).then(res => res.json());

            let d1 = parseFloat(k4[2][4]);
            let d2 = parseFloat(k4[1][4]);
            let d3 = parseFloat(k4[0][4]);

            let change4h = ((d1 - d2) / d2) * 100;
            let prev4h = ((d2 - d3) / d3) * 100;

            // ---------- OPEN INTEREST ----------
            let oiData = await fetch(
                `https://fapi.binance.com/fapi/v1/openInterest?symbol=${symbol}`
            ).then(res => res.json());

            let currentOI = parseFloat(oiData.openInterest);

            let prevOI = oiCache[symbol];
            oiCache[symbol] = currentOI;

            let oiChangePercent = 0;

            if (prevOI) {
                oiChangePercent = ((currentOI - prevOI) / prevOI) * 100;
            }

            // ---------- OI TREND ----------
            let oiTrend = "Neutral";
            let oiClass = "neutral";

            let threshold = 0.05; // ignore tiny noise

            if (change1h > 0 && oiChangePercent > threshold) {
                oiTrend = "Strong Buying";
                oiClass = "bull";
            }
            else if (change1h < 0 && oiChangePercent > threshold) {
                oiTrend = "Strong Selling";
                oiClass = "bear";
            }
            else if (change1h > 0 && oiChangePercent < -threshold) {
                oiTrend = "Short Covering";
            }
            else if (change1h < 0 && oiChangePercent < -threshold) {
                oiTrend = "Long Liquidation";
            }

            tableData.push({
                symbol,
                change1h,
                prev1h,
                change4h,
                prev4h,
                change24,
                volume,
                oiTrend,
                oiClass
            });

        } catch (err) {
            console.log("Error:", symbol);
        }

    }));

    tableData.sort((a,b) => b.change1h - a.change1h);

    renderTable();

    let now = new Date();
    document.getElementById("lastUpdated").innerText =
        "Last Updated: " + now.toLocaleTimeString();
}


function renderTable() {

    let tbody = document.querySelector("#cryptoTable tbody");
    tbody.innerHTML = "";

    tableData.forEach(row => {

        let tr = document.createElement("tr");
        let volFormatted = (row.volume / 1000000).toFixed(1) + "M";

        tr.innerHTML = `
            <td onclick="openChart('${row.symbol}')" style="cursor:pointer;color:#4da3ff">
                ${row.symbol}
            </td>

            <td class="${row.change1h >= 0 ? 'positive':'negative'}">${row.change1h.toFixed(2)}%</td>
            <td class="${row.prev1h >= 0 ? 'positive':'negative'}">${row.prev1h.toFixed(2)}%</td>

            <td class="${row.change4h >= 0 ? 'positive':'negative'}">${row.change4h.toFixed(2)}%</td>
            <td class="${row.prev4h >= 0 ? 'positive':'negative'}">${row.prev4h.toFixed(2)}%</td>

            <td class="${row.change24 >= 0 ? 'positive':'negative'}">${row.change24.toFixed(2)}%</td>

            <td>${volFormatted}</td>

            <td class="${row.oiClass}">${row.oiTrend}</td>
        `;

        tbody.appendChild(tr);

    });
}


function openChart(symbol) {
    let url = `https://www.binance.com/en/futures/${symbol}`;
    window.open(url, '_blank');
}


// Auto refresh
setInterval(fetchData, 30000);

// Initial load
fetchData();

</script>

</body>
</html>
