<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Futures Volatility Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: #0b0b0b;
    color: white;
    padding: 10px;
}

h2 { text-align: center; }

button {
    padding: 12px;
    margin: 10px 0;
    width: 100%;
    background: #2962ff;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
}

.panel {
    background:#111;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}

.tableWrap{
    overflow-x:auto;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    text-align: center;
    font-size: 12px;
}

th { background: #222; }

tr:nth-child(even) { background: #1a1a1a; }

.positive { color: #00ff9c; }
.negative { color: #ff4d4d; }

.bull { color: #00ff9c; font-weight: bold; }
.bear { color: #ff4d4d; font-weight: bold; }

.high { color:#00ff9c; font-weight:bold; }
.medium { color:#f1c40f; }
.low { color:#888; }

.detailsRow {
    background:#111;
    text-align:left;
}

    .detailBox {
    background:#111;
    padding:15px;
    border-radius:8px;
}

.detailTable {
    width:100%;
    border-collapse:collapse;
    margin-bottom:10px;
}

.detailTable th {
    background:#222;
    font-size:11px;
}

.detailTable td {
    font-size:11px;
    padding:6px;
}
    
</style>
</head>

<body>

<h2>🚀 Futures Volatility Scanner</h2>

<div id="lastUpdated">Last Updated: --</div>

<button onclick="fetchData()">🔄 Refresh</button>

<!-- BEST OPPORTUNITIES -->
<div class="panel">
<b>🔥 Best Opportunities</b>
<div class="tableWrap">
<table>
<thead>
<tr>
<th>Symbol</th>
<th>Direction</th>
<th>Score</th>
<th>Scalp</th>
<th>Breakout</th>
</tr>
</thead>
<tbody id="bestBody"></tbody>
</table>
</div>
</div>

<!-- MAIN TABLE -->
<div class="tableWrap">
<table id="cryptoTable">
<thead>
<tr>
<th>Symbol</th>
<th>1h</th>
<th>Prev1h</th>
<th>4h</th>
<th>Prev4h</th>
<th>24h</th>
<th>OI</th>
<th>Liquidation</th>
<th>Vol</th>
<th>ATR%</th>
<th>Breakout</th>
<th>Score</th>
<th>Scalp</th>
<th>Details</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

let tableData=[];
let oiCache={};
let sortedData=[];

async function fetchData(){

document.getElementById("lastUpdated").innerText="Loading...";

const ticker=await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr')
.then(res=>res.json());

let usdtPairs=ticker
.filter(c=>c.symbol.endsWith("USDT"))
.sort((a,b)=>parseFloat(b.quoteVolume)-parseFloat(a.quoteVolume))
.slice(0,25);

tableData=[];

await Promise.all(usdtPairs.map(async coin=>{

let symbol=coin.symbol;
let volume=parseFloat(coin.quoteVolume);
let change24=parseFloat(coin.priceChangePercent);
let dayHigh = parseFloat(coin.highPrice);
let dayLow = parseFloat(coin.lowPrice);
let currentPrice = parseFloat(coin.lastPrice);

try{

let k1=await fetch(
`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=1h&limit=20`
).then(res=>res.json());

let currentOpen = parseFloat(k1[19][1]);
let closes=k1.map(k=>parseFloat(k[4]));
let highs=k1.map(k=>parseFloat(k[2]));
let lows=k1.map(k=>parseFloat(k[3]));

let c1=closes[19];
let c2=closes[18];
let c3=closes[17];

let change1h=((c1-c2)/c2)*100;
let prev1h=((c2-c3)/c3)*100;

let trSum=0;
for(let i=6;i<20;i++){
let tr=Math.max(
highs[i]-lows[i],
Math.abs(highs[i]-closes[i-1]),
Math.abs(lows[i]-closes[i-1])
);
trSum+=tr;
}
let atr=(trSum/14)/c1*100;

if(Math.abs(change1h)<0.05 && atr<0.2) return;

let k4=await fetch(
`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=4h&limit=3`
).then(res=>res.json());

let d1=parseFloat(k4[2][4]);
let d2=parseFloat(k4[1][4]);
let d3=parseFloat(k4[0][4]);

let change4h=((d1-d2)/d2)*100;
let prev4h=((d2-d3)/d3)*100;

let oiData=await fetch(
`https://fapi.binance.com/fapi/v1/openInterest?symbol=${symbol}`
).then(res=>res.json());

let currentOI=parseFloat(oiData.openInterest);
let prevOI=oiCache[symbol];
oiCache[symbol]=currentOI;

let oiChange=prevOI?((currentOI-prevOI)/prevOI)*100:0;

let oiTrend="Neutral",oiClass="";
if(change1h>0&&oiChange>0.05){oiTrend="Strong Buying";oiClass="bull";}
else if(change1h<0&&oiChange>0.05){oiTrend="Strong Selling";oiClass="bear";}

let liqText="Low";
if(change1h>1&&oiChange<-0.05) liqText="🔥 Shorts Squeezed";
else if(change1h<-1&&oiChange<-0.05) liqText="🔥 Longs Wiped";
else if(Math.abs(change1h)>1&&oiChange>0.05) liqText="⚠️ Possible";

let breakout="-";
if(change1h>Math.abs(prev1h)*1.5) breakout="🚀 Up";
if(change1h<-Math.abs(prev1h)*1.5) breakout="💥 Down";

let score=50;
score+=change1h*5;
score+=change4h*3;
score+=change24*0.5;
if(oiTrend.includes("Strong"))score+=10;
if(atr>1)score+=10;

score=Math.max(0,Math.min(100,Math.round(score)));

let scalp="LOW",scalpClass="low";
if(score>75){scalp="🔥 HIGH";scalpClass="high";}
else if(score>60){scalp="⚡ MED";scalpClass="medium";}

tableData.push({
symbol,change1h,prev1h,change4h,prev4h,
change24,oiTrend,oiClass,liqText,
volume,atr,breakout,score,scalp,scalpClass,dayHigh,
dayLow,currentPrice,currentOpen
});

}catch(e){}

}));

renderBest();
renderTable();

let now=new Date();
document.getElementById("lastUpdated").innerText=
"Last Updated: "+now.toLocaleTimeString();
}

function renderBest(){

let best=[...tableData]
.sort((a,b)=>b.score-a.score)
.slice(0,5);

let body=document.getElementById("bestBody");
body.innerHTML="";

best.forEach(r=>{

let dir=r.change1h>0?"LONG":"SHORT";

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${r.symbol}</td>
<td>${dir}</td>
<td>${r.score}</td>
<td class="${r.scalpClass}">${r.scalp}</td>
<td>${r.breakout}</td>
`;

body.appendChild(tr);
});
}

function renderTable(){

let tbody=document.querySelector("#cryptoTable tbody");
tbody.innerHTML="";

sortedData=[...tableData].sort((a,b)=>b.change1h-a.change1h);

sortedData.forEach((row,index)=>{

let volFormatted=(row.volume/1000000).toFixed(1)+"M";

let tr=document.createElement("tr");
tr.setAttribute("data-index", index);

tr.innerHTML=`
<td onclick="openChart('${row.symbol}')" style="color:#4da3ff;cursor:pointer">
${row.symbol}</td>

<td class="${row.change1h>=0?'positive':'negative'}">${row.change1h.toFixed(2)}%</td>
<td class="${row.prev1h>=0?'positive':'negative'}">${row.prev1h.toFixed(2)}%</td>

<td class="${row.change4h>=0?'positive':'negative'}">${row.change4h.toFixed(2)}%</td>
<td class="${row.prev4h>=0?'positive':'negative'}">${row.prev4h.toFixed(2)}%</td>

<td class="${row.change24>=0?'positive':'negative'}">${row.change24.toFixed(2)}%</td>

<td class="${row.oiClass}">${row.oiTrend}</td>
<td>${row.liqText}</td>
<td>${volFormatted}</td>
<td>${row.atr.toFixed(2)}</td>
<td>${row.breakout}</td>
<td>${row.score}</td>
<td class="${row.scalpClass}">${row.scalp}</td>

<td style="cursor:pointer" onclick="toggleDetails(this)">▶</td>
`;

tbody.appendChild(tr);
});
}

function toggleDetails(element){

let currentRow = element.parentElement;
let tbody = document.querySelector("#cryptoTable tbody");

// remove existing detail row
let existing = document.querySelector(".detail-row");
if(existing){
    existing.remove();
}

// if already open on same row, just close
if(currentRow.classList.contains("expanded")){
    currentRow.classList.remove("expanded");
    return;
}

// remove expanded class from others
document.querySelectorAll("#cryptoTable tr").forEach(r=>r.classList.remove("expanded"));

currentRow.classList.add("expanded");

let index = currentRow.getAttribute("data-index");
let row = sortedData[index];

let volFormatted=(row.volume/1000000).toFixed(1)+"M";
let volFormatted=(row.volume/1000000).toFixed(1)+"M";

let distanceFromHigh = ((row.currentPrice - row.dayHigh) / row.dayHigh) * 100;
let distanceFromLow = ((row.currentPrice - row.dayLow) / row.dayLow) * 100;

let nearHigh = Math.abs(distanceFromHigh) < 1 ? "YES" : "NO";
let nearLow = Math.abs(distanceFromLow) < 1 ? "YES" : "NO";

let momentum = "Weak";
if(Math.abs(row.change1h) > 1) momentum = "Strong";
else if(Math.abs(row.change1h) > 0.5) momentum = "Moderate";

// Create detail row
let detailRow = document.createElement("tr");
detailRow.className = "detail-row";

detailRow.innerHTML = `
<td colspan="14">
<div class="detailBox">

<table class="detailTable">
<tr>
<th>Open</th>
<th>High</th>
<th>Low</th>
<th>Current</th>
<th>ATR%</th>
</tr>
<tr>
<td>${row.currentOpen.toFixed(4)}</td>
<td>${row.dayHigh.toFixed(4)}</td>
<td>${row.dayLow.toFixed(4)}</td>
<td>${row.currentPrice.toFixed(4)}</td>
<td>${row.atr.toFixed(2)}</td>
</tr>
</table>

<br>

<table class="detailTable">
<tr>
<th>1h</th>
<th>Prev1h</th>
<th>4h</th>
<th>Prev4h</th>
<th>24h</th>
</tr>
<tr>
<td>${row.change1h.toFixed(2)}%</td>
<td>${row.prev1h.toFixed(2)}%</td>
<td>${row.change4h.toFixed(2)}%</td>
<td>${row.prev4h.toFixed(2)}%</td>
<td>${row.change24.toFixed(2)}%</td>
</tr>
</table>

<br>

<table class="detailTable">
<tr>
<th>OI</th>
<th>Liquidation</th>
<th>Volume</th>
<th>Momentum</th>
<th>Near Day High</th>
<th>Near Day Low</th>
</tr>
<tr>
<td>${row.oiTrend}</td>
<td>${row.liqText}</td>
<td>${volFormatted}</td>
<td>${momentum}</td>
<td>${nearHigh}</td>
<td>${nearLow}</td>
</tr>
</table>

</div>
</td>
`;

currentRow.after(detailRow);
}

function openChart(symbol){
window.open(`https://www.binance.com/en/futures/${symbol}`,'_blank');
}

setInterval(fetchData,30000);
fetchData();

</script>
</body>
</html>
