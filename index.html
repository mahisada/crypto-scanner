<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Momentum Scanner Pro MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; background:#0b0b0b; color:white; padding:10px; }
h2 { text-align:center; }

.panel { background:#111; padding:10px; border-radius:10px; margin-bottom:12px; }

table { width:100%; border-collapse:collapse; }
th, td { padding:6px; text-align:center; font-size:12px; }
th { background:#222; }

.positive { color:#00ff9c; }
.negative { color:#ff4d4d; }

.strong { color:#00ff9c; font-weight:bold; }
.pullback { color:#f1c40f; }
</style>
</head>

<body>

<h2>🚀 Momentum Scanner Pro MAX</h2>
<div id="lastUpdated">--</div>

<div class="panel">
<b>📊 Signal History (Hybrid Tracking)</b>
<table>
<thead>
<tr>
<th>Symbol</th>
<th>Time</th>
<th>Dir</th>
<th>Entry</th>
<th>Now%</th>
<th>Max%</th>
<th>DD%</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>
</div>

<script>

let history = [];
let lastSignalDirection = {};

async function fetchData(){

const ticker = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr')
.then(r=>r.json());

let coins = ticker
.filter(c=>c.symbol.endsWith("USDT"))
.sort((a,b)=>parseFloat(b.quoteVolume)-parseFloat(a.quoteVolume))
.slice(0,15);

// ===== SIGNAL DETECTION =====
for(let coin of coins){

let symbol = coin.symbol;

let k = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=5m&limit=4`)
.then(r=>r.json());

let c1 = parseFloat(k[3][4]);
let c2 = parseFloat(k[2][4]);
let c3 = parseFloat(k[1][4]);

let move1=((c2-c3)/c3)*100;
let move2=((c1-c2)/c2)*100;

let dir=null;

if(move2>move1 && move2>0.2 && c1>c2 && c2>c3) dir="🚀";
else if(move2<move1 && move2<-0.2 && c1<c2 && c2<c3) dir="💥";

if(dir && lastSignalDirection[symbol] !== dir){

    lastSignalDirection[symbol] = dir;

    let entryTime = k[3][0];

    // 🔥 FULL HISTORY FETCH (ONLY ONCE)
    let klines = await fetch(
    `https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=5m&startTime=${entryTime}`
    ).then(r=>r.json());

    let entryPrice = c1;
    let maxPrice = entryPrice;
    let minPrice = entryPrice;

    klines.forEach(k=>{
        let high = parseFloat(k[2]);
        let low = parseFloat(k[3]);

        if(high > maxPrice) maxPrice = high;
        if(low < minPrice) minPrice = low;
    });

    history.push({
        symbol,
        time:new Date().toLocaleTimeString(),
        price:entryPrice,
        dir,
        maxPrice,
        minPrice,
        lastCandleTime:k[3][0]
    });

    if(history.length>30) history.shift();
}
}

// ===== UPDATE HISTORY (LIGHT) =====
let historyHTML="";

for(let h of history){

let k = await fetch(
`https://fapi.binance.com/fapi/v1/klines?symbol=${h.symbol}&interval=5m&limit=2`
).then(r=>r.json());

let candleTime = k[1][0];
let high = parseFloat(k[1][2]);
let low = parseFloat(k[1][3]);
let current = parseFloat(k[1][4]);

// update only on new candle
if(candleTime !== h.lastCandleTime){
    if(high > h.maxPrice) h.maxPrice = high;
    if(low < h.minPrice) h.minPrice = low;
    h.lastCandleTime = candleTime;
}

// calc
let change = ((current - h.price)/h.price)*100;

let maxMove;

if(h.dir==="🚀"){
    maxMove=((h.maxPrice - h.price)/h.price)*100;
}else{
    maxMove=((h.price - h.minPrice)/h.price)*100;
    change = -change;
}

let drawdown = maxMove - change;

let cls = "positive";
if(drawdown > 2) cls="pullback";

historyHTML+=`
<tr>
<td>${h.symbol}</td>
<td>${h.time}</td>
<td>${h.dir}</td>
<td>${h.price.toFixed(4)}</td>
<td class="${change>=0?'positive':'negative'}">${change.toFixed(2)}%</td>
<td class="positive">${maxMove.toFixed(2)}%</td>
<td class="${cls}">${drawdown.toFixed(2)}%</td>
</tr>`;
}

document.getElementById("history").innerHTML = historyHTML;

document.getElementById("lastUpdated").innerText =
"Updated: "+new Date().toLocaleTimeString();

}

setInterval(fetchData,60000);
fetchData();

</script>

</body>
</html>
