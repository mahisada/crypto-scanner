<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Momentum Scanner (5m)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; background:#0b0b0b; color:white; padding:10px; }
h2 { text-align:center; }

button {
    padding:12px; margin:10px 0; width:100%;
    background:#2962ff; color:white; border:none;
    border-radius:6px; font-size:16px;
}

.panel { background:#111; padding:10px; border-radius:8px; margin-bottom:10px; }

table { width:100%; border-collapse:collapse; }
th, td { padding:8px; text-align:center; font-size:12px; }
th { background:#222; cursor:pointer; }
tr:nth-child(even){ background:#1a1a1a; }

.positive { color:#00ff9c; }
.negative { color:#ff4d4d; }
.high { color:#00ff9c; font-weight:bold; }
.medium { color:#f1c40f; }
.low { color:#888; }
</style>
</head>

<body>

<h2>🚀 5m Momentum Scanner</h2>

<div id="lastUpdated">Last Updated: --</div>
<button onclick="fetchData()">🔄 Refresh</button>

<div class="panel">
<b>📈 Top Gainers</b>
<table>
<thead><tr><th>Symbol</th><th>24h</th><th>Remark</th></tr></thead>
<tbody id="gainersBody"></tbody>
</table>
</div>

<div class="panel">
<b>📉 Top Losers</b>
<table>
<thead><tr><th>Symbol</th><th>24h</th><th>Remark</th></tr></thead>
<tbody id="losersBody"></tbody>
</table>
</div>

<table id="cryptoTable">
<thead>
<tr>
<th onclick="setSort('symbol')">Symbol</th>
<th onclick="setSort('momentum')">Momentum</th>
<th onclick="setSort('change5m')">5m %</th>
<th onclick="setSort('change1h')">1h</th>
<th onclick="setSort('change4h')">4h</th>
<th>Ext</th>
<th>Pullback</th>
<th onclick="setSort('score')">Score</th>
<th>Signal</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

let tableData=[];
let sortKey="momentum";
let sortAsc=false;

async function fetchData(){

document.getElementById("lastUpdated").innerText="Loading...";

const ticker=await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr')
.then(r=>r.json());

let pairs=ticker
.filter(c=>c.symbol.endsWith("USDT"))
.sort((a,b)=>parseFloat(b.quoteVolume)-parseFloat(a.quoteVolume))
.slice(0,25);

tableData=[];

await Promise.all(pairs.map(async coin=>{

let symbol=coin.symbol;

// ===== 24H =====
let change24=parseFloat(coin.priceChangePercent);

// ===== 5m =====
let k5=await fetch(
`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=5m&limit=6`
).then(r=>r.json());

let c1=parseFloat(k5[5][4]);
let c2=parseFloat(k5[4][4]);
let c3=parseFloat(k5[3][4]);

let v1=parseFloat(k5[5][5]);
let v2=parseFloat(k5[4][5]);
let v3=parseFloat(k5[3][5]);

let change5m=((c1-c2)/c2)*100;

// ===== ACCELERATION =====
let move1=((c2-c3)/c3)*100;
let move2=((c1-c2)/c2)*100;

let accelerating = move2 > move1 && Math.abs(move2) > 0.2;

// ===== VOLUME =====
let volumeSpike = v1 > v2 && v2 > v3;

// ===== STRUCTURE =====
let up = c1 > c2 && c2 > c3;
let down = c1 < c2 && c2 < c3;

// ===== MOMENTUM SIGNAL =====
let momentum="❌";
if(accelerating && volumeSpike && up) momentum="🚀";
else if(accelerating && volumeSpike && down) momentum="💥";

// ===== 1H =====
let k1=await fetch(
`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=1h&limit=20`
).then(r=>r.json());

let closes=k1.map(k=>parseFloat(k[4]));
let change1h=((closes[19]-closes[18])/closes[18])*100;

// ===== 4H =====
let k4=await fetch(
`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=4h&limit=3`
).then(r=>r.json());

let change4h=((k4[2][4]-k4[1][4])/k4[1][4])*100;

// ===== EXTENSION =====
let ema=closes.slice(-9).reduce((a,b)=>a+b,0)/9;
let dist=((closes[19]-ema)/ema)*100;
let extension = dist>1.5 ? "⚠️" : "OK";

// ===== PULLBACK =====
let pullback="None";
if(up && move2<0) pullback="📉";
if(down && move2>0) pullback="📈";

// ===== SCORE =====
let score=Math.round(50 + change1h*5 + change4h*3 + change24*0.5);
score=Math.max(0,Math.min(100,score));

// ===== SIGNAL =====
let signal="❌";
if(momentum!=="❌" && extension==="OK") signal="🔥";
else if(score>60 && extension==="OK") signal="GOOD";

// ===== REMARK =====
let remark="❌ Skip";
if(signal==="🔥") remark="🔥 Early";
else if(extension!=="OK") remark="⚠️ Extended";
else if(momentum!=="❌") remark="🚀 Building";

// ===== PUSH =====
tableData.push({
symbol, momentum, change5m, change1h, change4h,
extension, pullback, score, signal, remark, change24
});

}));

renderBest();
renderTable();

document.getElementById("lastUpdated").innerText=
"Last Updated: "+new Date().toLocaleTimeString();
}

// SORT
function setSort(key){
if(sortKey===key) sortAsc=!sortAsc;
else{sortKey=key;sortAsc=false;}
renderTable();
}

// GAINERS/LOSERS
function renderBest(){
let gainers=[...tableData].sort((a,b)=>b.change24-a.change24).slice(0,5);
let losers=[...tableData].sort((a,b)=>a.change24-b.change24).slice(0,5);

let g=document.getElementById("gainersBody");
let l=document.getElementById("losersBody");

g.innerHTML=""; l.innerHTML="";

gainers.forEach(r=>{
g.innerHTML+=`<tr>
<td>${r.symbol}</td>
<td class="positive">${r.change24.toFixed(2)}%</td>
<td>${r.remark}</td>
</tr>`;
});

losers.forEach(r=>{
l.innerHTML+=`<tr>
<td>${r.symbol}</td>
<td class="negative">${r.change24.toFixed(2)}%</td>
<td>${r.remark}</td>
</tr>`;
});
}

// TABLE
function renderTable(){
let tbody=document.querySelector("#cryptoTable tbody");
tbody.innerHTML="";

let data=[...tableData].sort((a,b)=>{
let A=a[sortKey],B=b[sortKey];
if(typeof A==="string") return sortAsc?A.localeCompare(B):B.localeCompare(A);
return sortAsc?A-B:B-A;
});

data.forEach(r=>{
tbody.innerHTML+=`
<tr>
<td onclick="window.open('https://www.binance.com/en/futures/${r.symbol}','_blank')" style="color:#4da3ff;cursor:pointer">${r.symbol}</td>
<td>${r.momentum}</td>
<td class="${r.change5m>=0?'positive':'negative'}">${r.change5m.toFixed(2)}%</td>
<td>${r.change1h.toFixed(2)}%</td>
<td>${r.change4h.toFixed(2)}%</td>
<td>${r.extension}</td>
<td>${r.pullback}</td>
<td>${r.score}</td>
<td>${r.signal}</td>
</tr>`;
});
}

setInterval(fetchData,30000);
fetchData();

</script>
</body>
</html>
