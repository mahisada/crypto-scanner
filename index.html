<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Momentum Scanner PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; background:#0b0b0b; color:white; padding:10px; }
h2 { text-align:center; }

.panel {
    background:#111;
    padding:12px;
    border-radius:12px;
    margin-bottom:14px;
}

table { width:100%; border-collapse:collapse; }

th, td {
    padding:8px;
    text-align:center;
    font-size:12px;
}

th { background:#222; }

.positive { color:#00ff9c; }
.negative { color:#ff4d4d; }
.max { color:#00e5ff; }
.dd { color:#f1c40f; }
</style>
</head>

<body>

<h2>🚀 Momentum Scanner PRO</h2>
<div id="lastUpdated"></div>

<div class="panel">
<b>📈 Top Gainers</b>
<table><tbody id="gainers"></tbody></table>
</div>

<div class="panel">
<b>📉 Top Losers</b>
<table><tbody id="losers"></tbody></table>
</div>

<div class="panel">
<b>🚀 Momentum</b>
<table>
<thead><tr><th>Symbol</th><th>Dir</th><th>5m%</th></tr></thead>
<tbody id="momentum"></tbody>
</table>
</div>

<div class="panel">
<b>📊 Trade History (Analysis Ready)</b>
<table>
<thead>
<tr>
<th>Symbol</th>
<th>Time</th>
<th>Dir</th>
<th>Entry</th>
<th>Now%</th>
<th>Max%</th>
<th>DD%</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>
</div>

<script>

let history=[];
let historyLoaded=false;
let lastSignal={};

function getStartTime(){
    let now=new Date();
    let istOffset=5.5*60*60*1000;
    let utc=now.getTime()+now.getTimezoneOffset()*60000;
    let ist=new Date(utc+istOffset);
    ist.setHours(5,30,0,0);
    return ist.getTime();
}

async function fetchData(){

let ticker=await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr').then(r=>r.json());

let coins=ticker
.filter(c=>c.symbol.endsWith("USDT"))
.sort((a,b)=>b.quoteVolume-a.quoteVolume)
.slice(0,15);

// ===== GAINERS / LOSERS =====
render(coins.sort((a,b)=>b.priceChangePercent-a.priceChangePercent).slice(0,5),"gainers");
render(coins.sort((a,b)=>a.priceChangePercent-b.priceChangePercent).slice(0,5),"losers");

// ===== BACKFILL =====
if(!historyLoaded){

let start=getStartTime();

for(let coin of coins){

let symbol=coin.symbol;

let klines=await fetch(
`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=5m&limit=300`
).then(r=>r.json());

let signalFound=false;

for(let i=3;i<klines.length;i++){

let time=klines[i][0];
if(time<start) continue;

let c1=parseFloat(klines[i][4]);
let c2=parseFloat(klines[i-1][4]);
let c3=parseFloat(klines[i-2][4]);

let move1=((c2-c3)/c3)*100;
let move2=((c1-c2)/c2)*100;

let dir=null;

// STRONG LONG
if(
    move2 > move1 &&
    move2 > 0.5 &&   // increased threshold
    c1 > c2 && c2 > c3 &&
    ((c1 - c2) / c2) * 100 > 0.3
){
    dir = "🚀";
}

// STRONG SHORT
if(
    move2 < move1 &&
    move2 < -0.5 &&
    c1 < c2 && c2 < c3 &&
    ((c2 - c1) / c2) * 100 > 0.3
){
    dir = "💥";
}

if(dir && !signalFound){

signalFound=true;

let entryPrice=c1;
let maxPrice=c1;
let minPrice=c1;

for(let j=i;j<klines.length;j++){
let high=parseFloat(klines[j][2]);
let low=parseFloat(klines[j][3]);
if(high>maxPrice) maxPrice=high;
if(low<minPrice) minPrice=low;
}

history.push({
symbol,
time:new Date(time).toLocaleTimeString(),
price:entryPrice,
dir,
maxPrice,
minPrice
});

lastSignal[symbol]=dir;
}
}
}

historyLoaded=true;
}

// ===== MOMENTUM =====
let momentumHTML="";

for(let coin of coins){

let symbol=coin.symbol;

let k=await fetch(
`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=5m&limit=4`
).then(r=>r.json());

let c1=parseFloat(k[3][4]);
let c2=parseFloat(k[2][4]);
let c3=parseFloat(k[1][4]);

let move1=((c2-c3)/c3)*100;
let move2=((c1-c2)/c2)*100;

let dir=null;

if(move2>move1 && move2>0.2 && c1>c2 && c2>c3) dir="🚀";
if(move2<move1 && move2<-0.2 && c1<c2 && c2<c3) dir="💥";

if(dir){

momentumHTML+=`
<tr>
<td>${symbol}</td>
<td>${dir}</td>
<td class="${move2>=0?'positive':'negative'}">${move2.toFixed(2)}%</td>
</tr>`;

if(!lastSignal[symbol]){
lastSignal[symbol]=dir;

history.push({
symbol,
time:new Date().toLocaleTimeString(),
price:c1,
dir,
maxPrice:c1,
minPrice:c1
});
}
}
}

document.getElementById("momentum").innerHTML=momentumHTML;

// ===== UPDATE HISTORY =====
let html="";

for(let h of history){

let k=await fetch(
`https://fapi.binance.com/fapi/v1/klines?symbol=${h.symbol}&interval=5m&limit=2`
).then(r=>r.json());

let high=parseFloat(k[1][2]);
let low=parseFloat(k[1][3]);
let current=parseFloat(k[1][4]);

if(high>h.maxPrice) h.maxPrice=high;
if(low<h.minPrice) h.minPrice=low;

let change=((current-h.price)/h.price)*100;
let maxMove;

if(h.dir==="🚀"){
maxMove=((h.maxPrice-h.price)/h.price)*100;
}else{
maxMove=((h.price-h.minPrice)/h.price)*100;
change=-change;
}

let dd = maxMove - change;

html+=`
<tr>
<td>${h.symbol}</td>
<td>${h.time}</td>
<td>${h.dir}</td>
<td>${h.price.toFixed(4)}</td>
<td class="${change>=0?'positive':'negative'}">${change.toFixed(2)}%</td>
<td class="max">${maxMove.toFixed(2)}%</td>
<td class="dd">${dd.toFixed(2)}%</td>
</tr>`;
}

document.getElementById("history").innerHTML=html;

document.getElementById("lastUpdated").innerText="Updated: "+new Date().toLocaleTimeString();

}

function render(data,id){
let html="";
data.forEach(c=>{
html+=`<tr><td>${c.symbol}</td><td>${parseFloat(c.priceChangePercent).toFixed(2)}%</td></tr>`;
});
document.getElementById(id).innerHTML=html;
}

setInterval(fetchData,60000);
fetchData();

</script>

</body>
</html>
