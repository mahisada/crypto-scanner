<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Momentum Scanner PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    padding:10px;
}

h2{
    text-align:center;
}

.panel{
    background:#111;
    padding:12px;
    border-radius:12px;
    margin-bottom:14px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:8px;
    text-align:center;
    font-size:12px;
}

th{
    background:#222;
}

.positive{ color:#00ff9c; }
.negative{ color:#ff4d4d; }

.max{ color:#00e5ff; }
.dd{ color:#f1c40f; }

.small{
    color:#888;
    font-size:11px;
}

.active{
    color:#00ff9c;
    font-weight:bold;
}

.strong{
    color:#00e5ff;
    font-weight:bold;
}

.explosive{
    color:#ff9800;
    font-weight:bold;
}

.dead{
    color:#777;
}
</style>
</head>

<body>

<h2>🚀 Momentum Scanner PRO</h2>

<div id="lastUpdated"></div>

<!-- TOP GAINERS -->
<div class="panel">
<b>📈 Top Gainers (Since 5:30 IST)</b>

<table>
<thead>
<tr>
<th>Symbol</th>
<th>India</th>
<th>London</th>
<th>NewYork</th>
<th>Vol</th>
</tr>
</thead>

<tbody id="gainers"></tbody>
</table>
</div>

<!-- TOP LOSERS -->
<div class="panel">
<b>📉 Top Losers (Since 5:30 IST)</b>

<table>
<thead>
<tr>
<th>Symbol</th>
<th>India</th>
<th>London</th>
<th>NewYork</th>
<th>Vol</th>
</tr>
</thead>

<tbody id="losers"></tbody>
</table>
</div>

<!-- ATR SCANNER -->
<div class="panel">
<b>🔥 ATR Expansion Scanner</b>

<table>
<thead>
<tr>
<th>Symbol</th>
<th>15m ATR%</th>
<th>1H%</th>
<th>Status</th>
</tr>
</thead>

<tbody id="atrTable"></tbody>
</table>
</div>

<!-- HISTORY -->
<div class="panel">
<b>📊 Trade History (Analysis Ready)</b>

<table>
<thead>
<tr>
<th>Symbol</th>
<th>Time</th>
<th>Dir</th>
<th>Entry</th>
<th>Now%</th>
<th>Max%</th>
<th>DD%</th>
</tr>
</thead>

<tbody id="history"></tbody>
</table>
</div>

<script>

let history = [];
let historyLoaded = false;
let lastSignal = {};

function getStartTime(){

    let now = new Date();

    let istOffset = 5.5 * 60 * 60 * 1000;

    let utc = now.getTime() + now.getTimezoneOffset() * 60000;

    let ist = new Date(utc + istOffset);

    ist.setHours(5,30,0,0);

    return ist.getTime();
}

function formatVolume(v){

    if(v >= 1000000000){
        return (v / 1000000000).toFixed(2) + "B";
    }

    return (v / 1000000).toFixed(1) + "M";
}

function getATRStatus(atr){

    if(atr >= 1.2){
        return {
            text:"🚀 Explosive",
            cls:"explosive"
        };
    }

    if(atr >= 0.6){
        return {
            text:"🔥 Strong",
            cls:"strong"
        };
    }

    if(atr >= 0.3){
        return {
            text:"⚡ Active",
            cls:"active"
        };
    }

    return {
        text:"❄️ Dead",
        cls:"dead"
    };
}

    function getUTCSessionTime(hour, minute){

    let now = new Date();

    return Date.UTC(
        now.getUTCFullYear(),
        now.getUTCMonth(),
        now.getUTCDate(),
        hour,
        minute,
        0,
        0
    );
}
async function fetchData(){

    let ticker = await fetch(
    'https://fapi.binance.com/fapi/v1/ticker/24hr'
    ).then(r=>r.json());

    // ===== TOP 25 BY VOLUME =====

    let coins = ticker
    .filter(c => c.symbol.endsWith("USDT"))
    .sort((a,b)=>b.quoteVolume-a.quoteVolume)
    .slice(0,25);

    let start = getStartTime();
    let londonStart = getUTCSessionTime(8,0);
    let nyStart = getUTCSessionTime(13,30);

    let sessionData = [];

    let atrRows = [];

    // ===== MAIN LOOP =====

    for(let coin of coins){

        let symbol = coin.symbol;

        // ===== 5M DATA =====

        let k5 = await fetch(
        `https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=5m&limit=300`
        ).then(r=>r.json());

        // ===== SESSION CHANGE =====

        let indiaPrice = null;
let londonPrice = null;
let nyPrice = null;

for(let k of k5){

    let time = k[0];

    if(indiaPrice === null && time >= start){
        indiaPrice = parseFloat(k[1]);
    }

    if(londonPrice === null && time >= londonStart){
        londonPrice = parseFloat(k[1]);
    }

    if(nyPrice === null && time >= nyStart){
        nyPrice = parseFloat(k[1]);
    }
}

let current =
parseFloat(k5[k5.length-1][4]);

let indiaChange = null;
let londonChange = null;
let nyChange = null;

if(indiaPrice){
    indiaChange =
    ((current - indiaPrice)/indiaPrice)*100;
}

if(Date.now() >= londonStart && londonPrice){
    londonChange =
    ((current - londonPrice)/londonPrice)*100;
}

if(Date.now() >= nyStart && nyPrice){
    nyChange =
    ((current - nyPrice)/nyPrice)*100;
}

if(indiaChange !== null){

    sessionData.push({
        symbol,
        change:indiaChange,
        london:londonChange,
        ny:nyChange,
        volume:parseFloat(coin.quoteVolume)
    });
}

        // ===== ATR SECTION =====

        let k15 = await fetch(
        `https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=15m&limit=12`
        ).then(r=>r.json());

        let atrSum = 0;

        for(let i=1;i<k15.length;i++){

            let high =
            parseFloat(k15[i][2]);

            let low =
            parseFloat(k15[i][3]);

            let close =
            parseFloat(k15[i][4]);

            let atr =
            ((high-low)/close)*100;

            atrSum += atr;
        }

        let avgATR = atrSum / (k15.length-1);

        // ===== 1H MOVE =====

        let k1h = await fetch(
        `https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=1h&limit=2`
        ).then(r=>r.json());

        let h1Open =
        parseFloat(k1h[0][4]);

        let h1Close =
        parseFloat(k1h[1][4]);

        let h1Move =
        ((h1Close-h1Open)/h1Open)*100;

        let status =
        getATRStatus(avgATR);

        atrRows.push({
            symbol,
            atr:avgATR,
            move:h1Move,
            status
        });
    }

    // ===== RENDER GAINERS =====

    render(
        [...sessionData]
        .sort((a,b)=>b.change-a.change)
        .slice(0,10),
        "gainers"
    );

    // ===== RENDER LOSERS =====

    render(
        [...sessionData]
        .sort((a,b)=>a.change-b.change)
        .slice(0,10),
        "losers"
    );

    // ===== RENDER ATR =====

    let atrHTML = "";

    atrRows
    .sort((a,b)=>b.atr-a.atr)
    .forEach(r=>{

        atrHTML += `
        <tr>

            <td>${r.symbol}</td>

            <td class="${
                r.atr >= 0.3
                ? 'positive'
                : 'negative'
            }">
                ${r.atr.toFixed(2)}%
            </td>

            <td class="${
                r.move >= 0
                ? 'positive'
                : 'negative'
            }">
                ${r.move.toFixed(2)}%
            </td>

            <td class="${r.status.cls}">
                ${r.status.text}
            </td>

        </tr>`;
    });

    document.getElementById("atrTable").innerHTML =
    atrHTML;

    // ===== BACKFILL HISTORY =====

    if(!historyLoaded){

        for(let coin of coins){

            let symbol = coin.symbol;

            let klines = await fetch(
            `https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=5m&limit=300`
            ).then(r=>r.json());

            let signalFound = false;

            for(let i=3;i<klines.length;i++){

                let time = klines[i][0];

                if(time < start)
                    continue;

                let c1 =
                parseFloat(klines[i][4]);

                let c2 =
                parseFloat(klines[i-1][4]);

                let c3 =
                parseFloat(klines[i-2][4]);

                let move1 =
                ((c2-c3)/c3)*100;

                let move2 =
                ((c1-c2)/c2)*100;

                let dir = null;

                // ===== LONG =====

                if(
                    move2 > move1 &&
                    move2 > 0.5 &&
                    c1 > c2 &&
                    c2 > c3 &&
                    ((c1-c2)/c2)*100 > 0.3
                ){
                    dir = "🚀";
                }

                // ===== SHORT =====

                if(
                    move2 < move1 &&
                    move2 < -0.5 &&
                    c1 < c2 &&
                    c2 < c3 &&
                    ((c2-c1)/c2)*100 > 0.3
                ){
                    dir = "💥";
                }

                if(dir && !signalFound){

                    signalFound = true;

                    let entryPrice = c1;

                    let maxPrice = c1;
                    let minPrice = c1;

                    // ===== RANGE SCAN =====

                    for(let j=i;j<klines.length;j++){

                        let high =
                        parseFloat(klines[j][2]);

                        let low =
                        parseFloat(klines[j][3]);

                        if(high > maxPrice)
                            maxPrice = high;

                        if(low < minPrice)
                            minPrice = low;
                    }

                    history.push({
                        symbol,
                        time:new Date(time)
                        .toLocaleTimeString(),
                        price:entryPrice,
                        dir,
                        maxPrice,
                        minPrice
                    });

                    lastSignal[symbol] = dir;
                }
            }
        }

        historyLoaded = true;
    }

    // ===== UPDATE HISTORY =====

    let historyHTML = "";

    for(let h of history){

        let k = await fetch(
        `https://fapi.binance.com/fapi/v1/klines?symbol=${h.symbol}&interval=5m&limit=2`
        ).then(r=>r.json());

        let high =
        parseFloat(k[1][2]);

        let low =
        parseFloat(k[1][3]);

        let current =
        parseFloat(k[1][4]);

        if(high > h.maxPrice)
            h.maxPrice = high;

        if(low < h.minPrice)
            h.minPrice = low;

        let currentMove =
        ((current-h.price)/h.price)*100;

        let change,
            maxMove,
            dd;

        if(h.dir === "🚀"){

            change = currentMove;

            maxMove =
            ((h.maxPrice-h.price)/h.price)*100;

        }else{

            change = -currentMove;

            maxMove =
            ((h.price-h.minPrice)/h.price)*100;
        }

        dd = maxMove - change;

        historyHTML += `
        <tr>

            <td>${h.symbol}</td>

            <td>${h.time}</td>

            <td>${h.dir}</td>

            <td>${h.price.toFixed(4)}</td>

            <td class="${
                change>=0
                ? 'positive'
                : 'negative'
            }">
                ${change.toFixed(2)}%
            </td>

            <td class="max">
                ${maxMove.toFixed(2)}%
            </td>

            <td class="dd">
                ${dd.toFixed(2)}%
            </td>

        </tr>`;
    }

    document.getElementById("history").innerHTML =
    historyHTML;

    document.getElementById("lastUpdated").innerText =
    "Updated: " +
    new Date().toLocaleTimeString();
}

function render(data,id){

    let html = "";

    data.forEach(c=>{

        html += `
        <tr>

            <td>${c.symbol}</td>

            <td class="${
    c.change>=0
    ? 'positive'
    : 'negative'
}">
    ${c.change.toFixed(2)}%
</td>

<td class="${
    c.london === null
    ? 'small'
    : (c.london>=0?'positive':'negative')
}">
    ${c.london === null ? '--' : c.london.toFixed(2)+'%'}
</td>

<td class="${
    c.ny === null
    ? 'small'
    : (c.ny>=0?'positive':'negative')
}">
    ${c.ny === null ? '--' : c.ny.toFixed(2)+'%'}
</td>

<td class="small">
    ${formatVolume(c.volume)}
</td>

        </tr>`;
    });

    document.getElementById(id).innerHTML =
    html;
}

setInterval(fetchData,60000);

fetchData();

</script>

</body>
</html>
