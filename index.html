<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Momentum Scanner Pro+</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; background:#0b0b0b; color:white; padding:10px; }
h2 { text-align:center; }

.panel {
    background:#111;
    padding:10px;
    border-radius:10px;
    margin-bottom:12px;
}

table { width:100%; border-collapse:collapse; }
th, td { padding:6px; text-align:center; font-size:12px; }
th { background:#222; }

.positive { color:#00ff9c; }
.negative { color:#ff4d4d; }

.strong { color:#00ff9c; font-weight:bold; }
.pullback { color:#f1c40f; }
.weak { color:#888; }

</style>
</head>

<body>

<h2>🚀 Momentum Scanner Pro+</h2>
<div id="lastUpdated">--</div>

<div class="panel">
<b>📈 Top Gainers</b>
<table><thead><tr><th>Symbol</th><th>24h%</th></tr></thead>
<tbody id="gainers"></tbody></table>
</div>

<div class="panel">
<b>📉 Top Losers</b>
<table><thead><tr><th>Symbol</th><th>24h%</th></tr></thead>
<tbody id="losers"></tbody></table>
</div>

<div class="panel">
<b>🚀 Momentum Signals (VALID ONLY)</b>
<table>
<thead><tr><th>Symbol</th><th>Dir</th><th>5m%</th><th>Status</th></tr></thead>
<tbody id="momentum"></tbody>
</table>
</div>

<div class="panel">
<b>📊 Signal History (Max Tracking)</b>
<table>
<thead>
<tr>
<th>Symbol</th>
<th>Time</th>
<th>Dir</th>
<th>Entry</th>
<th>Now%</th>
<th>Max%</th>
<th>DD%</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>
</div>

<script>

let blacklist = [];
let history = [];
let lastSignalDirection = {};
let historyLoaded = false;

function getStartTimeIST(){
    let now = new Date();
    let istOffset = 5.5 * 60 * 60 * 1000;
    let utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    let istNow = new Date(utc + istOffset);
    istNow.setHours(5,30,0,0);
    return istNow.getTime();
}

async function fetchData(){

const ticker = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr')
.then(r=>r.json());

let coins = ticker
.filter(c => c.symbol.endsWith("USDT") && !blacklist.includes(c.symbol))
.sort((a,b)=>parseFloat(b.quoteVolume)-parseFloat(a.quoteVolume))
.slice(0,15);

// ===== GAINERS / LOSERS =====
let gainers = [...coins].sort((a,b)=>b.priceChangePercent-a.priceChangePercent).slice(0,5);
let losers = [...coins].sort((a,b)=>a.priceChangePercent-b.priceChangePercent).slice(0,5);

renderSimple(gainers,"gainers",true);
renderSimple(losers,"losers",false);

// ===== HISTORY BACK-CALC =====
if(!historyLoaded){

let startTime = getStartTimeIST();

for(let coin of coins){

let symbol = coin.symbol;

let klines = await fetch(
`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=5m&limit=300`
).then(r=>r.json());

let startCandle = klines.find(k => k[0] >= startTime);
if(!startCandle) continue;

let startPrice = parseFloat(startCandle[4]);
let currentPrice = parseFloat(klines[klines.length-1][4]);

let trend = ((currentPrice - startPrice)/startPrice)*100;

let trendDir = "NEUTRAL";
if(trend > 1) trendDir = "UP";
else if(trend < -1) trendDir = "DOWN";

for(let i=3;i<klines.length;i++){

let time = klines[i][0];
if(time < startTime) continue;

let c1 = parseFloat(klines[i][4]);
let c2 = parseFloat(klines[i-1][4]);
let c3 = parseFloat(klines[i-2][4]);

let move1=((c2-c3)/c3)*100;
let move2=((c1-c2)/c2)*100;

let dir=null;

if(move2>move1 && move2>0.2 && c1>c2 && c2>c3){
    dir="🚀";
}
else if(move2<move1 && move2<-0.2 && c1<c2 && c2<c3){
    dir="💥";
}

let valid = false;
if(trendDir==="UP" && dir==="🚀") valid=true;
if(trendDir==="DOWN" && dir==="💥") valid=true;

if(dir && valid && lastSignalDirection[symbol] !== dir){

    lastSignalDirection[symbol] = dir;

    history.push({
        symbol,
        time: new Date(time).toLocaleTimeString(),
        price: c1,
        dir,
        maxMove: 0
    });

    if(history.length > 30) history.shift();
}
}
}

historyLoaded = true;
}

// ===== MOMENTUM LIVE =====
let momentumHTML="";

for(let coin of coins){

let symbol = coin.symbol;

let k = await fetch(
`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=5m&limit=4`
).then(r=>r.json());

let c1 = parseFloat(k[3][4]);
let c2 = parseFloat(k[2][4]);
let c3 = parseFloat(k[1][4]);

let move1=((c2-c3)/c3)*100;
let move2=((c1-c2)/c2)*100;

let dir=null;

if(move2>move1 && move2>0.2 && c1>c2 && c2>c3){
    dir="🚀";
}
else if(move2<move1 && move2<-0.2 && c1<c2 && c2<c3){
    dir="💥";
}

// ===== TREND =====
let kFull = await fetch(
`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=5m&limit=100`
).then(r=>r.json());

let startTime = getStartTimeIST();
let startCandle = kFull.find(k => k[0] >= startTime);
if(!startCandle) continue;

let startPrice = parseFloat(startCandle[4]);
let currentPrice = parseFloat(kFull[kFull.length-1][4]);

let trend = ((currentPrice - startPrice)/startPrice)*100;

let trendDir = "UP";
if(trend < -1) trendDir="DOWN";
if(Math.abs(trend) < 1) trendDir="NEUTRAL";

let valid = false;
if(trendDir==="UP" && dir==="🚀") valid=true;
if(trendDir==="DOWN" && dir==="💥") valid=true;

if(dir && valid){

let status = Math.abs(move2)>1.2 ? "Late" : "Early";

momentumHTML += `
<tr>
<td>${symbol}</td>
<td>${dir}</td>
<td class="${move2>=0?'positive':'negative'}">${move2.toFixed(2)}%</td>
<td>${status}</td>
</tr>`;

if(lastSignalDirection[symbol] !== dir){

    lastSignalDirection[symbol] = dir;

    history.push({
        symbol,
        time: new Date().toLocaleTimeString(),
        price: c1,
        dir,
        maxMove: 0
    });

    if(history.length > 30) history.shift();
}
}
}

document.getElementById("momentum").innerHTML = momentumHTML;

// ===== UPDATE HISTORY =====
let historyHTML="";

for(let h of history){

let priceNow = await fetch(
`https://fapi.binance.com/fapi/v1/ticker/price?symbol=${h.symbol}`
).then(r=>r.json());

let current = parseFloat(priceNow.price);

let change = ((current - h.price)/h.price)*100;
if(h.dir==="💥") change = -change;

// update max
if(change > h.maxMove){
    h.maxMove = change;
}

let drawdown = h.maxMove - change;

// UI class
let strengthClass = "weak";
if(change > h.maxMove * 0.8) strengthClass="strong";
else if(drawdown > 2) strengthClass="pullback";

historyHTML += `
<tr>
<td>${h.symbol}</td>
<td>${h.time}</td>
<td>${h.dir}</td>
<td>${h.price.toFixed(4)}</td>
<td class="${change>=0?'positive':'negative'}">${change.toFixed(2)}%</td>
<td class="positive">${h.maxMove.toFixed(2)}%</td>
<td class="${strengthClass}">${drawdown.toFixed(2)}%</td>
</tr>`;
}

document.getElementById("history").innerHTML = historyHTML;

document.getElementById("lastUpdated").innerText =
"Updated: " + new Date().toLocaleTimeString();

}

function renderSimple(data,id,isGain){
let html="";
data.forEach(c=>{
html+=`<tr>
<td>${c.symbol}</td>
<td class="${isGain?'positive':'negative'}">${parseFloat(c.priceChangePercent).toFixed(2)}%</td>
</tr>`;
});
document.getElementById(id).innerHTML=html;
}

setInterval(fetchData,60000);
fetchData();

</script>

</body>
</html>
